# Task configuration for the agent workflow

research_task:
  description: >
    Conduct in-depth research on the latest advancements in artificial intelligence.
    Focus on identifying key technological trends, major breakthroughs, influential
    research papers, and notable innovations within the AI ecosystem.

  expected_output: >
    A structured list of 10 concise bullet points summarizing the most important
    developments and trends in artificial intelligence.

  agent: researcher

reporting_task:
  description: >
    Review the research findings generated by the researcher agent and expand
    each key point into a detailed section of a comprehensive report. The report
    should provide context, explanations, and insights for each finding.

  expected_output: >
    A complete report written in markdown format including a title, introduction,
    and well-structured sections elaborating each of the identified AI advancements.

  agent: reporting_analyst

requirement_interview_task:
  description: >
    Analyze this user request and convert it into a complete requirement specification:
    {user_input}

    The specification must include objective, audience,
    tone/style preference, constraints, expected output format, success criteria,
    and any missing information assumptions.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers
    - Keep section flow clean and readable using simple labels

  expected_output: >
    A plain-text section titled requirements_spec with clear headings: objective,
    audience, tone_style, constraints, output_format, success_criteria,
    and missing_information_assumptions.

  agent: requirement_interviewer

context_analysis_task:
  description: >
    Using the requirement specification from the previous task, produce a compact
    context brief that will guide prompt construction. Identify key domain details,
    risks, dependencies, edge cases, and operational assumptions.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers
    - Keep section flow clean and readable using simple labels

  expected_output: >
    A plain-text section titled context_brief with headings: domain_context,
    key_constraints, dependencies, edge_cases, risk_notes, and assumptions.

  agent: context_analyzer

prompt_drafting_task:
  description: >
    Using requirements_spec and context_brief, create the first production-ready
    prompt draft for this exact user input: {user_input}.

    Generate a practical "vibe coding" flow prompt that feels like a real
    engineering handoff, not a generic textbook template.

    Mandatory sections for every output:
    ## Role
    ## Goal
    ## Task
    ## Requirements
    ## Input Format
    ## Output Format
    ## Edge Cases
    ## Constraints
    ## System Requirements
    ## Prompting Strategy
    ## Implementation Flow
    ## Final Result Prompt

    Inside "Prompting Strategy", include these subsections every time:
    - Zero-Shot Prompting
    - Few-Shot Prompting
    - Chain-of-Thought Prompting (CoT)

    Add these only when relevant to the user input:
    - Text Summarization
    - Text Classification
    - Information Extraction
    - Security Guardrails
    - Domain-Specific Boundaries

    "Final Result Prompt" must be copy-ready plain text for immediate use with an LLM.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers
    - Keep heading order exact and keep flow natural and clean

    Keep content detailed but practical:
    - Specific to {user_input}
    - Avoid filler and repeated lines
    - Prefer actionable bullets and concrete constraints

  expected_output: >
    A single plain-text output containing all mandatory headings in the exact order,
    plus optional relevant headings only when needed, ending with
    "Final Result Prompt" containing one copy-ready final prompt.

  agent: prompt_architect

prompt_critique_task:
  description: >
    Review prompt_draft_v1 and create a strict critique report. Identify ambiguous
    instructions, missing constraints, inconsistent formatting, and likely failure
    modes. For each issue provide a direct fix instruction.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers

  expected_output: >
    A plain-text section titled critique_report with headings: strengths,
    weaknesses, risk_score, and revision_actions.

  agent: prompt_critic

prompt_refinement_task:
  description: >
    Apply critique_report updates and produce a final user-facing prompt package.
    The final output must be copy-ready plain text and must include all required
    headings from the draft stage while improving clarity and execution quality.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers

  expected_output: >
    A plain-text section titled prompt_final with headings: final_prompt,
    strict_variant, balanced_variant, creative_variant, and usage_notes.

  agent: prompt_refiner

validation_task:
  description: >
    Validate prompt_final for completeness and formatting quality. Confirm all
    required headings are present and that the output is safe, concise, and
    directly usable in terminal-driven workflows.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers

  expected_output: >
    A plain-text section titled validation_report with headings: checklist,
    issues_found, and final_status. If valid, set final_status to approved.

  agent: qa_policy_reviewer
