# Task configuration for the agent workflow

research_task:
  description: >
    Conduct in-depth research on the latest advancements in artificial intelligence.
    Focus on identifying key technological trends, major breakthroughs, influential
    research papers, and notable innovations within the AI ecosystem.

  expected_output: >
    A structured list of 10 concise bullet points summarizing the most important
    developments and trends in artificial intelligence.

  agent: researcher

reporting_task:
  description: >
    Review the research findings generated by the researcher agent and expand
    each key point into a detailed section of a comprehensive report. The report
    should provide context, explanations, and insights for each finding.

  expected_output: >
    A complete report written in markdown format including a title, introduction,
    and well-structured sections elaborating each of the identified AI advancements.

  agent: reporting_analyst

requirement_interview_task:
  description: >
    Analyze this user request and convert it into a complete requirement specification:
    {user_input}

    Also use these structured generation preferences:
    {generation_brief}

    Treat prompt_mode and response_length as strict controls.
    - prompt_mode=prompt_engineering means precision-first, explicit constraints,
      and technical clarity.
    - prompt_mode=vibe_coding means practical builder tone, fast implementation
      orientation, and high usefulness for coding workflows.

    response_length controls depth:
    - short: compact, highest-signal requirements only
    - balanced: practical detail with concise structure
    - long: deeper specification with richer constraints and edge handling

    Treat user-provided sample prompts as style references unless the user explicitly
    asks to merge them into one prompt. If multiple examples are present, identify
    the primary objective and list secondary references as inspiration only.

    The specification must include: primary_objective, audience,
    tone_style_preference, non_negotiable_rules, optional_preferences,
    expected_output_format, success_criteria, and missing_information_assumptions.

    If the user gives direct wording for policy, safety, tone, or response style,
    preserve that wording with minimal edits.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers
    - Keep section flow clean and readable using simple labels

  expected_output: >
    A plain-text section titled requirements_spec with clear headings:
    primary_objective, audience, tone_style_preference, non_negotiable_rules,
    optional_preferences, expected_output_format, success_criteria,
    and missing_information_assumptions.

  agent: requirement_interviewer

context_analysis_task:
  description: >
    Using the requirement specification from the previous task, produce a compact
    context brief that will guide prompt construction. Identify key domain details,
    risks, dependencies, edge cases, and operational assumptions.

    Respect response_length depth control from generation preferences.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers
    - Keep section flow clean and readable using simple labels

  expected_output: >
    A plain-text section titled context_brief with headings: domain_context,
    key_constraints, dependencies, edge_cases, risk_notes, and assumptions.

  agent: context_analyzer

prompt_drafting_task:
  description: >
    Using requirements_spec and context_brief, create the first production-ready
    prompt draft for this exact user input: {user_input}.

    Use these generation preferences as mandatory controls:
    model={model}
    prompt_mode={prompt_mode}
    response_length={response_length}

    If prompt_mode is prompt_engineering, bias toward explicit instruction design,
    stronger output contracts, and deterministic constraints.
    If prompt_mode is vibe_coding, bias toward builder-friendly language,
    implementation momentum, and practical coding delivery.

    response_length depth rules:
    - short: minimal but complete output, no unnecessary rationale
    - balanced: one complete practical package with moderate detail
    - long: fuller constraints, examples, and stronger edge-case guidance

    Build an adaptive prompt package, not a rigid universal template.
    If the user already provided a preferred structure (for example: Role, Core Rules,
    Safety, Response Style), keep that structure and improve clarity.

    If no explicit structure is provided by the user, use this default structure:
    role
    goal
    task
    requirements
    constraints
    output_format
    final_result_prompt

    Writing quality requirements:
    - Natural, concise, and human phrasing
    - Avoid repetitive sentence openings and repeated wording
    - Avoid robotic filler, generic hype, or over-explaining
    - Keep constraints explicit and enforceable
    - Keep the final prompt immediately copy-ready

    For user requests that define a behavioral persona, ensure the final prompt includes:
    - role boundaries
    - response behavior rules
    - safety escalation behavior
    - formatting and tone controls
    - explicit "do not" constraints from the user

    If the user asks for customization from examples, infer reusable style rules
    from the examples and apply them to the primary objective.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers
    Keep flow natural and clean

    Keep content detailed but practical:
    - Specific to {user_input}
    - Avoid filler and repeated lines
    - Prefer concrete constraints and direct language

  expected_output: >
    A single plain-text output titled prompt_draft_v1 containing headings:
    role, goal, task, requirements, constraints, output_format,
    final_result_prompt, and short_rationale.
    final_result_prompt must be one copy-ready final prompt in the user's preferred style.

  agent: prompt_architect

prompt_critique_task:
  description: >
    Review prompt_draft_v1 and create a strict critique report. Identify ambiguous
    instructions, missing constraints, inconsistent formatting, and likely failure
    modes. For each issue provide a direct fix instruction.

    Add a concision_and_humanity review that checks for robotic tone,
    repeated wording, and unnecessary verbosity.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers

  expected_output: >
    A plain-text section titled critique_report with headings: strengths,
    weaknesses, risk_score, and revision_actions.

  agent: prompt_critic

prompt_refinement_task:
  description: >
    Apply critique_report updates and produce a final user-facing prompt package.
    The final output must be copy-ready plain text and must preserve the user's
    preferred structure while improving clarity and execution quality.

    Enforce mode and length controls from generation preferences.
    The final_prompt section must reflect the selected prompt_mode voice and
    selected response_length depth.

    Prioritize brevity, natural flow, and non-repetitive phrasing.
    If multiple variants are not requested, return only one final prompt.

    Keep or restore clear section labels in the final package so users can see
    role and requirements explicitly.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers

  expected_output: >
    A plain-text section titled prompt_final with headings:
    role, goal, task, requirements, constraints, output_format,
    final_prompt, and usage_notes.
    Include strict_variant, balanced_variant, and creative_variant only if explicitly requested.

  agent: prompt_refiner

validation_task:
  description: >
    Validate prompt_final for completeness and formatting quality. Confirm all
    required headings are present and that the output is safe, concise, and
    directly usable in terminal-driven workflows.

    Verify the final prompt is not robotic: no repeated sentence starters,
    no bloated filler, and no contradictory rules.

    Output style rules:
    - Plain text only
    - Do not use markdown syntax
    - Do not use *, #, -, _, or backticks as formatting markers

  expected_output: >
    A plain-text section titled validation_report with headings: checklist,
    issues_found, and final_status. If valid, set final_status to approved.

  agent: qa_policy_reviewer
