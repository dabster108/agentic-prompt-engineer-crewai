# Task configuration for the agent workflow

research_task:
  description: >
    Conduct in-depth research on the latest advancements in artificial intelligence.
    Focus on identifying key technological trends, major breakthroughs, influential
    research papers, and notable innovations within the AI ecosystem.

  expected_output: >
    A structured list of 10 concise bullet points summarizing the most important
    developments and trends in artificial intelligence.

  agent: researcher

reporting_task:
  description: >
    Review the research findings generated by the researcher agent and expand
    each key point into a detailed section of a comprehensive report. The report
    should provide context, explanations, and insights for each finding.

  expected_output: >
    A complete report written in markdown format including a title, introduction,
    and well-structured sections elaborating each of the identified AI advancements.

  agent: reporting_analyst

requirement_interview_task:
  description: >
    Analyze the user's intent and convert it into a complete requirement specification
    for prompt engineering. The specification must include objective, audience,
    tone/style preference, constraints, expected output format, success criteria,
    and any missing information assumptions.

  expected_output: >
    A markdown section titled requirements_spec with clear headings: objective,
    audience, tone_style, constraints, output_format, success_criteria,
    and missing_information_assumptions.

  agent: requirement_interviewer

context_analysis_task:
  description: >
    Using the requirement specification from the previous task, produce a compact
    context brief that will guide prompt construction. Identify key domain details,
    risks, dependencies, edge cases, and operational assumptions.

  expected_output: >
    A markdown section titled context_brief with headings: domain_context,
    key_constraints, dependencies, edge_cases, risk_notes, and assumptions.

  agent: context_analyzer

prompt_drafting_task:
  description: >
    Using requirements_spec and context_brief, create the first production-ready
    prompt draft. The draft must define role, objective, context, strict instructions,
    boundaries, output format, and quality checks.

  expected_output: >
    A markdown section titled prompt_draft_v1 with headings: role,
    objective, context, instructions, constraints, output_format,
    and quality_checklist.

  agent: prompt_architect
